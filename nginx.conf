server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Content changes by editing files on the host; keep HTML/data fresh,
    # cache the vendored library longer.
    location ^~ /vendor/ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location ^~ /data/ {
        expires 5m;
    }
    # Always revalidate HTML/CSS/JS so layout and nav changes show up
    # immediately instead of browsers heuristically serving stale copies.
    location ~* \.(?:html|css|js)$ {
        add_header Cache-Control "no-cache";
    }
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ =404;
    }
}
