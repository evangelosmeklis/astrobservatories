  <div class="page page--wide">
    <h2>All observatories</h2>

    <div class="filters">
      <input type="search" id="f-search" placeholder="Search by name or place…" aria-label="Search">
      <select id="f-country" aria-label="Filter by country">
        <option value="">All countries</option>
      </select>
      <select id="f-type" aria-label="Filter by type">
        <option value="">All types</option>
      </select>
      <select id="f-sky" aria-label="Filter by sky darkness">
        <option value="">Any sky</option>
        <option value="dark">Dark sky (Bortle 1–3)</option>
        <option value="moderate">Moderate (Bortle 4–6)</option>
        <option value="bright">Bright (Bortle 7–9)</option>
      </select>
      <select id="f-sort" aria-label="Sort">
        <option value="name">Sort: Name A–Z</option>
        <option value="altitude">Sort: Highest first</option>
        <option value="oldest">Sort: Oldest first</option>
        <option value="newest">Sort: Newest first</option>
      </select>
    </div>

    <p class="result-count" id="result-count"></p>
    <div class="cards" id="cards"></div>
  </div>
