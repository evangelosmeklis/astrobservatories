<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astrobservatories · Observatories of the World</title>
  <meta name="description" content="Interactive map of astronomical observatories around the world — history, telescopes and Bortle sky darkness for each site">

<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">🔭</span>
      <div class="brand-text">
        <h1>Astrobservatories</h1>
        <p class="subtitle">Astronomical observatories around the world</p>
      </div>
    </div>
    <nav class="nav nav-main">
      <a href="index.html" class="active">Map</a>
      <a href="list.html">List</a>

      <nav class="nav">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <a class="gh-link" href="https://github.com/evangelosmeklis/astrobservatories" target="_blank" rel="noopener" aria-label="View source on GitHub" title="View source on GitHub">

      <button type="button" id="theme-btn" class="theme-btn" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <main>
    <div id="map" aria-label="Map of astronomical observatories"></div>

    <div class="map-search">
      <input id="map-search-input" type="search" placeholder="Search observatories…" autocomplete="off" aria-label="Search observatories">
      <div id="map-search-results" class="search-results" hidden></div>
    </div>

    <aside id="panel" class="panel" hidden aria-live="polite">
      <button type="button" id="panel-close" class="panel-close" aria-label="Close">×</button>
      <div id="panel-content"></div>
    </aside>

    <div class="legend">
      <div class="legend-icons">
        <span>🔭 Optical</span>
        <span>📡 Radio</span>
        <span>☀️ Solar</span>
        <span>🏛️ Historic</span>
      </div>
      <span class="legend-title">Bortle scale (sky darkness)</span>
      <div class="legend-scale" id="legend-scale"></div>
      <div class="legend-ends">
        <span>darkest</span>
        <span>brightest</span>
      </div>
    </div>
  </main>

  <noscript>
    <p class="noscript">This page requires JavaScript.</p>
  </noscript>

  <script src="js/theme.js"></script>
  <script src="vendor/leaflet/leaflet.js"></script>

  <script src="js/app.js"></script>

</html>
